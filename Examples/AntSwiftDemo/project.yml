name: AntSwiftDemo
options:
  bundleIdPrefix: com.autonomi.examples
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true

# Consume the ant-swift package from the consumer repo it lives in
# (this examples folder is inside that repo). Use a relative path dep
# so the demo always tracks the working tree's Package.swift, even on
# branches before v0.0.2 is tagged. To pin against a published version,
# replace with `url:` + `from:`.
packages:
  AntSwift:
    path: ../..
  # WalletConnect spike (iOS only). Reown AppKit is the successor to
  # Web3Modal — the same stack the desktop app uses (Reown AppKit + wagmi).
  # Product/module is `ReownAppKit`. Kept iOS-only because the connect modal
  # and a transitive dep (CoinbaseWalletSDK) are iOS-oriented; all call sites
  # are guarded with #if os(iOS).
  ReownAppKit:
    url: https://github.com/reown-com/reown-swift
    majorVersion: 1.0.0

targets:
  AntSwiftDemo:
    type: application
    supportedDestinations: [iOS, macOS]
    sources: [Sources/AntSwiftDemo]
    dependencies:
      - package: AntSwift
        product: AntFfi
      # iOS-only: keep this off the macOS build (module name clash + the
      # package targets iOS). All call sites are guarded with #if os(iOS).
      - package: ReownAppKit
        product: ReownAppKit
        platformFilter: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        # Test/dev only — the demo loads files from /Users/<user>/Library/...
        # and needs outbound networking. App Sandbox would block both.
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        # No team / signing required for local dev runs.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
